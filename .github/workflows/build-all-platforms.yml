name: All Platforms Build
on:
    workflow_dispatch:
jobs:
    windows-build:
        uses: ./.github/workflows/windows-build.yml
    linux-amd64-build:
        uses: ./.github/workflows/linux-amd64-build.yml
    linux-arm64-build:
        uses: ./.github/workflows/linux-arm64-build.yml

    merge-artifacts:
        runs-on: ubuntu-latest
        needs: [windows-build, linux-amd64-build, linux-arm64-build]
        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Use Node.js 22.14.0
              uses: actions/setup-node@v4
              with:
                  node-version: "22.14.0"

            - name: Get Build Version
              run: |
                  cd nexus
                  echo "VERSION=$(node -p "require('./build_package.json').version")" >> $GITHUB_ENV

            - name: Merge Artifacts
              uses: actions/upload-artifact/merge@v4
              with:
                  name: nexus-release-all-platforms@${{ env.VERSION }}
                  pattern: nexus-release-*
                  delete-merged: false
