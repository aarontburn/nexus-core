name: Prebuild
on:
    workflow_dispatch:
    workflow_call:
jobs:
    check_build_package_and_electron-builder:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Use Node.js 22.14.0
              uses: actions/setup-node@v4
              with:
                  node-version: "22.14.0"

            - name: Run build-version-checker.js
              run: node ./scripts/build-version-checker.js
